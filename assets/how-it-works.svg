<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <defs>
    <linearGradient id="hw-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="hw-brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8">
        <animate attributeName="stop-color" values="#38bdf8;#a855f7;#38bdf8" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#38bdf8;#a855f7" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="hw-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="hw-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="260" rx="14" fill="url(#hw-bg)"/>
  <rect width="800" height="260" rx="14" stroke="#1e293b" stroke-width="1" fill="none"/>

  <!-- ═══ Step 1: Browser ═══ -->
  <g transform="translate(35, 40)">
    <rect width="180" height="170" rx="12" fill="url(#hw-card)" stroke="#f87171" stroke-width="1" stroke-opacity="0.4"/>
    <text x="90" y="35" text-anchor="middle" font-size="24">🌐</text>
    <text x="90" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="13" fill="#f1f5f9">Your Browser</text>
    <!-- Error lines -->
    <rect x="15" y="78" width="150" height="18" rx="4" fill="#450a0a" stroke="#f87171" stroke-width="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="91" font-family="monospace" font-size="9" fill="#f87171">TypeError: undefined</text>
    <rect x="15" y="102" width="150" height="18" rx="4" fill="#082f49" stroke="#38bdf8" stroke-width="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="115" font-family="monospace" font-size="9" fill="#38bdf8">GET /api → 404</text>
    <rect x="15" y="126" width="150" height="18" rx="4" fill="#1a0533" stroke="#a855f7" stroke-width="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="139" font-family="monospace" font-size="9" fill="#a855f7">CSP: blocked font</text>
    <!-- Step label -->
    <text x="90" y="164" text-anchor="middle" font-family="Inter,sans-serif" font-weight="600" font-size="9" fill="#475569">① Errors happen</text>
  </g>

  <!-- ═══ Arrow 1 ═══ -->
  <g transform="translate(225, 118)">
    <line x1="0" y1="0" x2="70" y2="0" stroke="#334155" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="70,-5 82,0 70,5" fill="#6366f1"/>
    <circle r="4" fill="#38bdf8" filter="url(#hw-glow)">
      <animateMotion path="M0,0 L82,0" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#a855f7" filter="url(#hw-glow)">
      <animateMotion path="M0,0 L82,0" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle r="4" fill="#f87171" filter="url(#hw-glow)">
      <animateMotion path="M0,0 L82,0" dur="1.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
  </g>

  <!-- ═══ Step 2: DebugClip ═══ -->
  <g transform="translate(310, 30)">
    <rect width="180" height="190" rx="12" fill="url(#hw-card)" stroke="url(#hw-brand)" stroke-width="1.5"/>
    <!-- Logo -->
    <rect x="70" y="14" width="40" height="40" rx="10" fill="url(#hw-brand)">
      <animate attributeName="rx" values="10;12;10" dur="2s" repeatCount="indefinite"/>
    </rect>
    <polygon points="90,20 81,38 87,38 85,50 95,36 89,36" fill="white"/>
    <!-- Badge -->
    <rect x="140" y="10" width="26" height="18" rx="9" fill="#ef4444">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="153" y="23" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="10" fill="white">5</text>
    <text x="90" y="74" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="13" fill="url(#hw-brand)">DebugClip</text>
    <text x="90" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Auto-captures everything</text>
    <!-- Checklist -->
    <g font-family="Inter,sans-serif" font-size="9" fill="#94a3b8">
      <text x="20" y="112"><tspan fill="#34d399">✓</tspan> Console errors</text>
      <text x="20" y="128"><tspan fill="#34d399">✓</tspan> Network failures</text>
      <text x="20" y="144"><tspan fill="#34d399">✓</tspan> CSP violations</text>
      <text x="20" y="160"><tspan fill="#34d399">✓</tspan> Stack traces + payloads</text>
    </g>
    <!-- Step label -->
    <text x="90" y="184" text-anchor="middle" font-family="Inter,sans-serif" font-weight="600" font-size="9" fill="#475569">② Auto-captured</text>
  </g>

  <!-- ═══ Arrow 2 ═══ -->
  <g transform="translate(500, 118)">
    <line x1="0" y1="0" x2="70" y2="0" stroke="#334155" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="70,-5 82,0 70,5" fill="#6366f1"/>
    <circle r="4" fill="#34d399" filter="url(#hw-glow)">
      <animateMotion path="M0,0 L82,0" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="41" y="-8" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#64748b">Markdown</text>
    <text x="41" y="16" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#64748b">prompt</text>
  </g>

  <!-- ═══ Step 3: AI ═══ -->
  <g transform="translate(585, 40)">
    <rect width="180" height="170" rx="12" fill="url(#hw-card)" stroke="#34d399" stroke-width="1" stroke-opacity="0.4"/>
    <text x="90" y="35" text-anchor="middle" font-size="24">🤖</text>
    <text x="90" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="13" fill="#f1f5f9">Claude / ChatGPT</text>
    <!-- Results appearing -->
    <rect x="15" y="78" width="150" height="18" rx="4" fill="#022c22" stroke="#34d399" stroke-width="0.5">
      <animate attributeName="opacity" values="0;1;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="91" font-family="monospace" font-size="9" fill="#34d399">✓ Root cause identified</text>
    <rect x="15" y="102" width="150" height="18" rx="4" fill="#022c22" stroke="#34d399" stroke-width="0.5">
      <animate attributeName="opacity" values="0;0;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="115" font-family="monospace" font-size="9" fill="#34d399">✓ Exact fix provided</text>
    <rect x="15" y="126" width="150" height="18" rx="4" fill="#022c22" stroke="#34d399" stroke-width="0.5">
      <animate attributeName="opacity" values="0;0;0.5;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="139" font-family="monospace" font-size="9" fill="#34d399">✓ Code example ready</text>
    <!-- Step label -->
    <text x="90" y="164" text-anchor="middle" font-family="Inter,sans-serif" font-weight="600" font-size="9" fill="#475569">③ AI gives you the fix</text>
  </g>

  <!-- Bottom tagline -->
  <text x="400" y="248" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="11" fill="url(#hw-brand)">⚡ Error → AI Fix in 10 seconds. Zero configuration.</text>
</svg>
