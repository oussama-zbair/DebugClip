<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3884ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="card-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6366f1" flood-opacity="0.15"/>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="420" rx="16" fill="url(#bg)"/>

  <!-- ═══ Browser window (left side) ═══ -->
  <g transform="translate(40, 40)">
    <!-- Browser chrome -->
    <rect width="380" height="340" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="380" height="36" rx="12" fill="#1e293b"/>
    <rect y="24" width="380" height="12" fill="#1e293b"/>
    <!-- Traffic lights -->
    <circle cx="18" cy="18" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="36" cy="18" r="5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="54" cy="18" r="5" fill="#34d399" opacity="0.8"/>
    <!-- URL bar -->
    <rect x="72" y="10" width="220" height="16" rx="4" fill="#0f172a"/>
    <text x="82" y="22" font-family="monospace" font-size="8" fill="#64748b">myapp.localhost:3000/dashboard</text>

    <!-- Page content (faded app UI) -->
    <rect x="15" y="50" width="350" height="24" rx="4" fill="#1e293b"/>
    <rect x="15" y="50" width="120" height="24" rx="4" fill="#1e293b"/>
    <text x="25" y="66" font-family="Inter,sans-serif" font-size="10" fill="#475569">Dashboard</text>
    
    <!-- Faded content blocks -->
    <rect x="15" y="84" width="170" height="80" rx="6" fill="#1e293b" opacity="0.5"/>
    <rect x="195" y="84" width="170" height="80" rx="6" fill="#1e293b" opacity="0.5"/>
    <rect x="15" y="174" width="350" height="40" rx="6" fill="#1e293b" opacity="0.3"/>

    <!-- Error flash in console area -->
    <rect x="15" y="228" width="350" height="100" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
    <text x="25" y="246" font-family="monospace" font-size="8" fill="#475569">Console</text>
    
    <!-- Error lines appearing -->
    <g>
      <rect x="25" y="256" width="320" height="18" rx="3" fill="#450a0a" opacity="0.6">
        <animate attributeName="opacity" values="0;0.6;0.6" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="32" y="269" font-family="monospace" font-size="8.5" fill="#f87171">
        <animate attributeName="opacity" values="0;1;1" dur="3s" repeatCount="indefinite"/>
        ✕ TypeError: Cannot read properties of undefined (reading 'map')
      </text>
    </g>
    <g>
      <rect x="25" y="278" width="320" height="18" rx="3" fill="#450a0a" opacity="0.4">
        <animate attributeName="opacity" values="0;0;0.4" dur="4s" repeatCount="indefinite"/>
      </rect>
      <text x="32" y="291" font-family="monospace" font-size="8.5" fill="#f87171" opacity="0.8">
        <animate attributeName="opacity" values="0;0;0.8" dur="4s" repeatCount="indefinite"/>
        ✕ GET /api/users 500 (Internal Server Error)
      </text>
    </g>
    <g>
      <rect x="25" y="300" width="320" height="18" rx="3" fill="#431407" opacity="0.3">
        <animate attributeName="opacity" values="0;0;0;0.3" dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="32" y="313" font-family="monospace" font-size="8.5" fill="#fb923c" opacity="0.7">
        <animate attributeName="opacity" values="0;0;0;0.7" dur="5s" repeatCount="indefinite"/>
        ⚠ CSP: Refused to load stylesheet from 'fonts.bunny.net'
      </text>
    </g>
  </g>

  <!-- ═══ DebugClip floating card (right, overlapping browser) ═══ -->
  <g transform="translate(390, 55)" filter="url(#card-shadow)">
    <!-- Card body -->
    <rect width="410" height="320" rx="16" fill="#0f172a" stroke="url(#card-stroke)" stroke-width="1.5"/>
    
    <!-- Card header -->
    <g transform="translate(20, 20)">
      <!-- Logo -->
      <rect width="32" height="32" rx="8" fill="url(#brand)"/>
      <polygon points="16,6 10,18 14,18 12,26 20,16 16,16" fill="white"/>
      <!-- Title -->
      <text x="42" y="14" font-family="Inter,sans-serif" font-weight="700" font-size="13" fill="#f1f5f9">DebugClip</text>
      <text x="42" y="28" font-family="Inter,sans-serif" font-size="9" fill="#64748b">3 issues detected</text>
      <!-- Badge -->
      <rect x="320" y="4" width="44" height="22" rx="11" fill="#ef4444">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <text x="342" y="19" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="10" fill="white">3</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="62" x2="390" y2="62" stroke="#1e293b" stroke-width="1"/>

    <!-- Error item 1 -->
    <g transform="translate(20, 72)">
      <rect width="370" height="56" rx="8" fill="#450a0a" fill-opacity="0.3" stroke="#f87171" stroke-width="0.5" stroke-opacity="0.3">
        <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="10" y="10" width="36" height="18" rx="4" fill="#ef4444"/>
      <text x="28" y="23" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="8" fill="white">ERR</text>
      <text x="56" y="23" font-family="Inter,sans-serif" font-weight="500" font-size="10" fill="#f1f5f9">TypeError: Cannot read 'map' of undefined</text>
      <text x="56" y="40" font-family="monospace" font-size="8" fill="#64748b">src/components/UserList.tsx:42</text>
      <text x="330" y="23" font-family="monospace" font-size="8" fill="#475569">2s ago</text>
    </g>

    <!-- Error item 2 -->
    <g transform="translate(20, 136)">
      <rect width="370" height="56" rx="8" fill="#082f49" fill-opacity="0.3" stroke="#38bdf8" stroke-width="0.5" stroke-opacity="0.3"/>
      <rect x="10" y="10" width="36" height="18" rx="4" fill="#0ea5e9"/>
      <text x="28" y="23" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="8" fill="white">500</text>
      <text x="56" y="23" font-family="Inter,sans-serif" font-weight="500" font-size="10" fill="#f1f5f9">GET /api/users — Internal Server Error</text>
      <text x="56" y="40" font-family="monospace" font-size="8" fill="#64748b">Response: {"error": "database connection failed"}</text>
      <text x="330" y="23" font-family="monospace" font-size="8" fill="#475569">5s ago</text>
    </g>

    <!-- Error item 3 -->
    <g transform="translate(20, 200)">
      <rect width="370" height="56" rx="8" fill="#1a0533" fill-opacity="0.3" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.3"/>
      <rect x="10" y="10" width="42" height="18" rx="4" fill="#7c3aed"/>
      <text x="31" y="23" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="8" fill="white">CSP</text>
      <text x="62" y="23" font-family="Inter,sans-serif" font-weight="500" font-size="10" fill="#f1f5f9">Refused to load stylesheet</text>
      <text x="62" y="40" font-family="monospace" font-size="8" fill="#64748b">Blocked: fonts.bunny.net/css (style-src)</text>
      <text x="330" y="23" font-family="monospace" font-size="8" fill="#475569">8s ago</text>
    </g>

    <!-- Action button -->
    <g transform="translate(20, 270)">
      <rect width="370" height="36" rx="10" fill="url(#brand)">
        <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
      </rect>
      <text x="185" y="23" text-anchor="middle" font-family="Inter,sans-serif" font-weight="600" font-size="11" fill="white">📋 Copy AI Prompt  •  🚀 Send to Claude</text>
    </g>
  </g>

  <!-- Floating particles connecting browser to card -->
  <circle r="3" fill="#f87171" filter="url(#glow-sm)">
    <animateMotion path="M380,150 C400,130 410,140 420,135" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#38bdf8" filter="url(#glow-sm)">
    <animateMotion path="M380,200 C400,190 415,195 425,188" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#a855f7" filter="url(#glow-sm)">
    <animateMotion path="M380,260 C400,250 410,255 425,248" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle ambient particle -->
  <circle r="1.5" fill="#6366f1" opacity="0.4">
    <animateMotion path="M500,380 C520,370 540,375 560,365" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
