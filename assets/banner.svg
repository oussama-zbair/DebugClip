<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8">
        <animate attributeName="stop-color" values="#38bdf8;#a855f7;#38bdf8" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#6366f1">
        <animate attributeName="stop-color" values="#6366f1;#38bdf8;#6366f1" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#6366f1;#a855f7" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3884ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.8">
        <animate attributeName="offset" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)"/>

  <!-- Animated grid dots -->
  <g opacity="0.08">
    <circle cx="100" cy="100" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="100" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="100" r="1.5" fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="100" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="100" r="1.5" fill="#a855f7"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="100" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="100" r="1.5" fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="100" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="100" r="1.5" fill="#a855f7"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="100" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="100" r="1.5" fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="300" r="1.5" fill="#a855f7"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="300" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="300" r="1.5" fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="300" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="300" r="1.5" fill="#a855f7"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="300" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="300" r="1.5" fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="300" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="300" r="1.5" fill="#a855f7"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="300" r="1.5" fill="#6366f1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="300" r="1.5" fill="#38bdf8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Pulsing glow orbs -->
  <circle cx="350" cy="200" r="120" fill="#6366f1" opacity="0.04">
    <animate attributeName="r" values="120;140;120" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.04;0.07;0.04" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="200" r="100" fill="#38bdf8" opacity="0.03">
    <animate attributeName="r" values="100;120;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Logo icon with pulse -->
  <g transform="translate(564, 80)">
    <rect width="72" height="72" rx="16" fill="url(#logo-grad)">
      <animate attributeName="rx" values="16;18;16" dur="2s" repeatCount="indefinite"/>
    </rect>
    <polygon points="39,6 18,38 31,38 28,66 49,34 36,34" fill="white" filter="url(#glow)"/>
  </g>

  <!-- Title with animated gradient -->
  <text x="600" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="54" fill="url(#brand)">
    DebugClip
  </text>

  <!-- Tagline -->
  <text x="600" y="255" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="19" fill="#e2e8f0">
    Capture Browser Errors → Send to AI → Get Instant Fixes
  </text>

  <!-- Subtitle -->
  <text x="600" y="295" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#64748b">
    Chrome Extension • Console Errors • Network Failures • CSP Violations • Claude • ChatGPT
  </text>

  <!-- Animated bottom line -->
  <rect x="200" y="345" width="800" height="2" rx="1" fill="url(#line-grad)"/>
  <!-- Scanning dot -->
  <circle r="4" fill="#6366f1" filter="url(#glow)">
    <animateMotion path="M200,346 L1000,346" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
